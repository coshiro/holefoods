unique_name: DateOfSale
object_type: dimension
label: DateOfSale
type: time

hierarchies:

  - unique_name: Actual
    label: Actual
    filter_empty: "yes"

    levels:

      - unique_name: YearSold

      - unique_name: MonthSold

      - unique_name: DaySold

level_attributes:

  - unique_name: DaySold
    label: DaySold
    dataset: dateomniture.dataset
    key_columns:
      - AsDate
    name_column: fulldatealternatekey
    time_unit: day

  - unique_name: MonthSold
    label: MonthSold
    dataset: dateomniture.dataset
    key_columns:
      - calendaryear
      - monthnumberofyear
    name_column: englishmonthname
    time_unit: month

  - unique_name: YearSold
    label: YearSold
    dataset: dateomniture.dataset
    key_columns:
      - calendaryear
    name_column: calendaryear
    time_unit: year
